<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>宜人出行</title>
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    
    <style>
      #crash-log { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #d00; z-index: 999999; padding: 20px; box-sizing: border-box; overflow: auto; font-family: monospace; font-size: 14px; white-space: pre-wrap; word-break: break-all; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    
    <div id="crash-log">
      <h3>⚠️ 系统发生错误 (调试模式)</h3>
      <div id="error-content"></div>
      <button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;font-size:16px;">刷新页面</button>
    </div>

    <script>
      // 这是一个原生 JS 监控，不依赖 Vue
      function showCrash(msg) {
        var el = document.getElementById('crash-log');
        var content = document.getElementById('error-content');
        if(el && content) {
          el.style.display = 'block';
          content.innerHTML += '<hr>' + msg;
        }
        console.error(msg);
      }

      window.onerror = function (message, source, lineno, colno, error) {
        showCrash("❌ JS Error:\n" + message + "\nFile: " + source + "\nLine: " + lineno);
      };

      window.addEventListener('unhandledrejection', function(event) {
        showCrash("❌ Promise Error:\n" + (event.reason ? event.reason.toString() : 'Unknown Error'));
      });
    </script>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
